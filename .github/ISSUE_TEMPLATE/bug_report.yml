name: Bug Report
description: Report a bug in the FiveM Lua script
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug in as much detail as possible.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the bug step-by-step.
      placeholder: |
        1. Start the server
        2. Run /xyz command
        3. See error in console
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Attach logs or screenshots if possible.
